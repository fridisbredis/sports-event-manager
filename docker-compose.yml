services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder   # use builder stage locally for faster rebuilds
    command: npm run dev
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    env_file:
      - .env.local
    environment:
      - NODE_ENV=development
